<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Eduardo Alves - Desenvolvedor Fullstack and Mobile">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050b1f"/>
      <stop offset="35%" stop-color="#0a1a3a"/>
      <stop offset="65%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0"/>
      <stop offset="50%" stop-color="#93c5fd" stop-opacity="1"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>

    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0 L0 0 0 44" fill="none" stroke="#60a5fa" stroke-width="0.6" stroke-opacity="0.06"/>
    </pattern>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>
  <rect width="1200" height="280" fill="url(#grid)"/>
  <ellipse cx="600" cy="150" rx="520" ry="130" fill="url(#glow)"/>

  <g fill="#93c5fd">
    <circle cx="80"   cy="60"  r="1.6" opacity="0.7"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="160"  cy="200" r="1.2" opacity="0.5"><animate attributeName="opacity" values="0.15;0.7;0.15" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="240"  cy="40"  r="1.8" opacity="0.6"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="5.0s" repeatCount="indefinite"/></circle>
    <circle cx="340"  cy="170" r="1.2" opacity="0.45"><animate attributeName="opacity" values="0.15;0.65;0.15" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="440"  cy="55"  r="1.4" opacity="0.55"><animate attributeName="opacity" values="0.2;0.75;0.2" dur="4.6s" repeatCount="indefinite"/></circle>
    <circle cx="760"  cy="50"  r="1.6" opacity="0.6"><animate attributeName="opacity" values="0.2;0.85;0.2" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="860"  cy="195" r="1.2" opacity="0.5"><animate attributeName="opacity" values="0.15;0.7;0.15" dur="4.4s" repeatCount="indefinite"/></circle>
    <circle cx="960"  cy="65"  r="1.8" opacity="0.65"><animate attributeName="opacity" values="0.2;0.85;0.2" dur="5.2s" repeatCount="indefinite"/></circle>
    <circle cx="1060" cy="180" r="1.2" opacity="0.5"><animate attributeName="opacity" values="0.15;0.7;0.15" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="1140" cy="80"  r="1.5" opacity="0.55"><animate attributeName="opacity" values="0.2;0.75;0.2" dur="4.0s" repeatCount="indefinite"/></circle>
  </g>

  <g opacity="0.18" stroke="#60a5fa" stroke-width="1.2" fill="none">
    <path d="M-40 70 L120 70 L160 110 L260 110"/>
    <path d="M1240 210 L1080 210 L1040 170 L940 170"/>
  </g>

  <g aria-hidden="true">
    <path d="M0,240 C200,205 400,235 600,225 C800,215 1000,245 1200,225 L1200,280 L0,280 Z" fill="#60a5fa" fill-opacity="0.10"/>
    <path d="M0,255 C220,225 420,255 620,245 C820,235 1010,260 1200,245 L1200,280 L0,280 Z" fill="#3b82f6" fill-opacity="0.18"/>
    <path d="M0,268 C260,250 560,272 860,260 C1020,253 1120,265 1200,260 L1200,280 L0,280 Z" fill="#1e3a8a" fill-opacity="0.30"/>
  </g>

  <text x="600" y="130" text-anchor="middle" font-family="Inter, 'Segoe UI', system-ui, sans-serif" font-size="76" font-weight="800" letter-spacing="-2.5" fill="#ffffff">Eduardo Alves</text>

  <line x1="500" y1="156" x2="700" y2="156" stroke="url(#accent)" stroke-width="1.6"/>

  <text x="600" y="190" text-anchor="middle" font-family="Inter, 'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="500" letter-spacing="3" fill="#dbeafe">DESENVOLVEDOR FULLSTACK &amp; MOBILE</text>

  <g font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="11" fill="#93c5fd" opacity="0.65">
    <text x="32" y="34" letter-spacing="2">// EDUARDO.DEV</text>
    <text x="1168" y="34" text-anchor="end" letter-spacing="2">ARIQUEMES · RO</text>
  </g>
</svg>
